<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #111; color: #fff; font-family: 'Nunito', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #game-container {
            position: relative; width: 100vw; height: 100vh; max-width: 1200px; max-height: 800px;
            background-color: #5C94FC; box-shadow: 0 10px 30px rgba(0,0,0,0.8); overflow: hidden;
            transition: background-color 3s ease-in-out; 
        }

        #game-container.boss-arena { background-color: #1a1a24; }
        #game-container.intro-dark { background-color: #000000; }

        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.6); z-index: 20; transition: opacity 0.5s ease;
        }
        .hidden { opacity: 0; pointer-events: none; display: none !important; }

        #hud {
            position: absolute; top: 15px; left: 20px; right: 20px; display: flex; justify-content: space-between;
            align-items: flex-start; z-index: 10; transition: opacity 0.5s ease; pointer-events: none;
        }
        .hud-group { text-align: center; color: #fff; text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 4px 0 #000; }
        .brand-container { text-align: left; }
        .brand-title {
            font-size: 2.2rem; font-weight: 900; color: #FFCE00; letter-spacing: 1px; margin-bottom: -5px;
            text-shadow: 2px 2px 0 #D22824, -2px -2px 0 #D22824, 2px -2px 0 #D22824, -2px 2px 0 #D22824, 0 4px 0 #000;
        }
        .brand-subtitle { font-size: 1rem; font-weight: 700; color: #fff; padding-left: 5px; }
        .hud-label { font-size: 1.1rem; font-weight: 900; letter-spacing: 1px; margin-bottom: -2px; }
        .hud-value { font-size: 1.6rem; font-weight: 900; }
        .hud-coin-icon {
            display: inline-block; width: 18px; height: 24px; background-color: #F8B800; border: 2px solid #000;
            border-radius: 50%; vertical-align: middle; margin-right: 5px; box-shadow: inset -4px 0 0 rgba(255,255,255,0.5);
        }

        #boss-hp-container {
            animation: pulse-glow 2s infinite alternate;
        }
        #boss-hp-fill {
            box-shadow: 0 0 15px #EF4444, inset 0 0 10px #fff;
        }
        @keyframes pulse-glow {
            0% { text-shadow: 0 0 5px #F87171; }
            100% { text-shadow: 0 0 20px #EF4444, 0 0 30px #B91C1C; }
        }

            font-size: 5rem; font-weight: 900; color: #FFCE00;
            text-shadow: 4px 4px 0 #D22824, -2px -2px 0 #D22824, 4px -2px 0 #D22824, -2px 4px 0 #D22824, 0 8px 0 #000;

        .btn {
            padding: 15px 50px; font-size: 1.8rem; font-weight: 900; color: white; background: #4ADE80;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration, vol = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function buildSprite(dataArray, scale = 2.5) {
        const height = dataArray.length;
        const width = dataArray[0].length;
        const c = document.createElement('canvas');
        c.width = width; c.height = height;
        const ctx = c.getContext('2d');
        for(let y = 0; y < height; y++) {
            for(let x = 0; x < width; x++) {
                const char = dataArray[y][x];
                if (char !== '.' && palette[char]) {
                    ctx.fillStyle = palette[char]; ctx.fillRect(x, y, 1, 1);
                }
            }
        }
        const scaled = document.createElement('canvas');
        scaled.width = width * scale; scaled.height = height * scale;
        const sCtx = scaled.getContext('2d');
        sCtx.imageSmoothingEnabled = false; sCtx.drawImage(c, 0, 0, scaled.width, scaled.height);
        return scaled;
    }

    class Particle {
        constructor(x, y, color, speedScale = 1.0, isGravity = false) {

            this.life = 1.0; this.color = color; this.size = Math.random() * 8 + 6; this.isGravity = isGravity;
        }
        update(dt) {
            if (this.isGravity) this.vy += gravity * 0.5 * dt; 
            this.x += this.vx * dt; this.y += this.vy * dt; this.life -= dt * 2.0;
        }
        draw(ctx) {
            if (this.life <= 0) return;
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = Math.max(0, this.life); 
            
            let grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            grad.addColorStop(0, this.color);
            grad.addColorStop(1, 'transparent');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    class Enemy {
        constructor(x, y, enemyType = 'dash') {
            this.x = x * tileSize; this.y = y * tileSize; this.w = 32; this.h = 32;
            this.vx = -80; this.vy = 0; this.dead = false; this.deadTimer = 0; this.animTimer = 0;
            this.enemyType = enemyType; this.state = 'PATROL'; this.stateTimer = 0;
            this.detectRange = 250; this.baseSpeed = 80; this.dashSpeed = 350; this.facingRight = false;
            if (this.enemyType === 'jump') { this.stateTimer = 1.0 + Math.random(); this.baseSpeed = 50; }
        }
        checkCliff(blocks) {
            let checkX = this.facingRight ? this.x + this.w + 10 : this.x - 10; let checkY = this.y + this.h + 5; 
            for (let b of blocks) {
                if (b.type === 'spike' || (b.type === 'falling' && b.isFalling)) continue;
                if (checkX >= b.x && checkX <= b.x + b.w && checkY >= b.y && checkY <= b.y + b.h) return false; 
            }
            return true; 
        }
        update(dt, blocks, playerObj) {
            if (this.dead) { this.deadTimer -= dt; return; }
            this.animTimer += dt * 5; this.vy += gravity * dt;
            if (gameState === 'PLAYING' || gameState === 'TRUE_BOSS_FIGHT') {
                let distX = playerObj.x - this.x; let distY = Math.abs(playerObj.y - this.y);
                if (this.enemyType === 'jump') {
                    if (this.state === 'PATROL') {
                        if (this.vx === 0) this.vx = this.facingRight ? this.baseSpeed : -this.baseSpeed;
                        this.stateTimer -= dt;
                        if (this.vy === 0 && this.checkCliff(blocks)) { this.vx *= -1; this.facingRight = this.vx > 0; this.x += this.vx * dt * 3; }
                        if (this.stateTimer <= 0 && this.vy === 0) {
                            this.vy = -850; this.stateTimer = 2.0 + Math.random() * 1.5; sfx.jump();
                            if (Math.abs(distX) < 350) { this.vx = distX > 0 ? 150 : -150; this.facingRight = distX > 0; } 
                            else this.vx = this.facingRight ? 100 : -100;
                        }
                    }
                } else {
                    if (this.state === 'PATROL') {
                        if (this.vx === 0) this.vx = this.facingRight ? this.baseSpeed : -this.baseSpeed;

                        if (Math.abs(distX) < this.detectRange && distY < 50) { this.state = 'ANTICIPATE'; this.stateTimer = 0.4; this.vx = 0; sfx.charge(); }
                    } else if (this.state === 'ANTICIPATE') {
                        this.stateTimer -= dt; this.facingRight = distX > 0;

                    } else if (this.state === 'COOLDOWN') {
                        this.stateTimer -= dt; if (this.stateTimer <= 0) { this.state = 'PATROL'; this.vx = this.facingRight ? this.baseSpeed : -this.baseSpeed; }
                    }
                }
            }
            this.x += this.vx * dt; this.handleCollisions(blocks, 'x');
            this.y += this.vy * dt; let wasInAir = this.vy > gravity * dt;

            if (this.state === 'PATROL' && this.vx !== 0) this.facingRight = this.vx > 0;
            else if (this.state === 'DASH' && this.vx === 0) { this.state = 'COOLDOWN'; this.stateTimer = 0.5; }
            if (this.y > logicalHeight + 200) this.dead = true;
        }
        handleCollisions(blocks, axis) {
            for (let b of blocks) {
                if (b.type === 'spike') continue;
                if (axis === 'x') {
                    if (this.x < b.x + b.w && this.x + this.w > b.x && this.y + 2 < b.y + b.h && this.y + this.h - 2 > b.y) {
                        this.x = this.vx > 0 ? b.x - this.w : b.x + b.w; this.vx *= -1; 
                    }
                } else {
                    if (this.x + 2 < b.x + b.w && this.x + this.w - 2 > b.x && this.y < b.y + b.h && this.y + this.h > b.y) {
                        if (this.vy > 0) { this.y = b.y - this.h; this.vy = 0; }
                    }
                }
            }
        }
        draw(ctx) {
            if (this.dead) { if (this.deadTimer > 0) ctx.drawImage(assets.enemyDead, this.x, this.y + 16); return; }

            let drawX = this.x; let drawY = this.y;
            if (this.state === 'ANTICIPATE') { drawX += (Math.random() - 0.5) * 4; drawY += (Math.random() - 0.5) * 4; } 
            else if (this.state === 'PATROL' && this.vy === 0) drawY += Math.sin(globalTime * 15) * 2;
